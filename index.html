<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>感情メロディプレイヤー - Emotion Melody Player</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            transition: background-color 1.5s ease, color 1.5s ease;
            position: relative;
        }
        /* 背景画像用のコンテナ */
        #bg-image-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            transition: opacity 1.5s ease;
            opacity: 0;
        }
        #bg-image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .theme-default { background-color: #f3f4f6; color: #1f2937; }
        .theme-happy { background-color: #fef3c7; color: #78350f; }
        .theme-sad { background-color: #e0f2fe; color: #0c4a6e; }
        .theme-relaxed { background-color: #d1fae5; color: #064e3b; }
        .theme-energetic { background-color: #fee2e2; color: #7f1d1d; }

        @keyframes slow-spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .spinning-art { animation: slow-spin 25s linear infinite; }
    </style>
</head>
<body class="theme-default min-h-screen flex flex-col justify-between font-sans overflow-x-hidden">

    <!-- 背景画像レイヤー -->
    <div id="bg-image-container">
        <img id="bg-img" src="" alt="背景画像">
    </div>

    <!-- コンテンツ -->
    <header class="text-center py-4 relative z-10">
        <h1 class="text-3xl md:text-4xl font-extrabold tracking-tight flex items-center justify-center gap-2"><span>🎵</span> 感情メロディプレイヤー</h1>
    </header>

    <main class="flex-grow flex items-center justify-center my-8 relative z-10 max-w-2xl mx-auto w-full px-6">
        <div class="w-full bg-white/70 backdrop-blur-md rounded-3xl p-8 shadow-xl border border-white/50">
            <!-- 各画面は省略しますが、ロジック内でIDを制御します -->
            <div id="screen-start" class="text-center space-y-6">
                <h2 class="text-2xl font-bold">今のあなたに寄り添う音楽を</h2>
                <button id="btn-start" class="px-8 py-4 bg-gray-950 text-white font-bold rounded-full hover:bg-gray-800">診断をはじめる</button>
            </div>
            
            <div id="screen-question" class="hidden space-y-8">
                <div id="progress-bar" class="bg-gray-800 h-2 rounded-full" style="width: 33%"></div>
                <h2 id="question-text" class="text-xl font-bold text-center"></h2>
                <div id="options-container" class="grid grid-cols-1 gap-4"></div>
            </div>

            <div id="screen-result" class="hidden text-center space-y-6">
                <div class="w-48 h-48 mx-auto rounded-full overflow-hidden border-4 border-white/80 shadow-2xl">
                    <img id="result-image" src="" alt="アートワーク" class="w-full h-full object-cover">
                </div>
                <h2 id="result-title" class="text-3xl font-extrabold"></h2>
                <button id="btn-play-toggle" class="w-16 h-16 rounded-full bg-current flex items-center justify-center mx-auto text-white">再生</button>
                <button id="btn-restart" class="text-xs underline">もう一度</button>
            </div>
        </div>
    </main>

    <script>
        const emotions = {
            happy: { themeClass: 'theme-happy', label: 'ハッピー', bgImage: 'happy.png', icon: '☀️' },
            sad: { themeClass: 'theme-sad', label: 'メランコリー', bgImage: 'sad.png', icon: '🌧️' },
            relaxed: { themeClass: 'theme-relaxed', label: 'リラックス', bgImage: 'relaxed.png', icon: '☕' },
            energetic: { themeClass: 'theme-energetic', label: 'エネルギッシュ', bgImage: 'energetic.png', icon: '🔥' }
        };

        const bgImageContainer = document.getElementById('bg-image-container');
        const bgImg = document.getElementById('bg-img');

        function displayResult() {
            const emotionData = emotions[state.currentEmotion];
            document.body.className = `${emotionData.themeClass} min-h-screen flex flex-col justify-between font-sans`;
            
            // 背景画像の適用 (透過度を上げて表示)
            bgImg.src = emotionData.bgImage;
            bgImageContainer.style.opacity = '0.3'; 

            document.getElementById('screen-question').classList.add('hidden');
            document.getElementById('screen-result').classList.remove('hidden');
            // ...以下略
        }
        
        // ... 他の関数はそのまま
    </script>
</body>
</html>
